<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tejas Pawar — synthwave banner">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#05010f"/>
      <stop offset="0.55" stop-color="#160a2e"/>
      <stop offset="0.8" stop-color="#3b1155"/>
      <stop offset="1" stop-color="#ff2fd6" stop-opacity="0.28"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd319"/>
      <stop offset="0.45" stop-color="#ff901f"/>
      <stop offset="0.72" stop-color="#ff2975"/>
      <stop offset="1" stop-color="#8c1eff"/>
    </linearGradient>
    <linearGradient id="txt" x1="-0.4" y1="0" x2="1.4" y2="0" spreadMethod="reflect">
      <stop offset="0" stop-color="#00e5ff"/>
      <stop offset="0.5" stop-color="#ff2fd6"/>
      <stop offset="1" stop-color="#00e5ff"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-0.6 0; 0.6 0; -0.6 0" dur="7s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="meteor" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSoft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <mask id="sunMask">
      <rect x="440" y="80" width="320" height="200" fill="#fff"/>
      <rect x="440" y="192" width="320" height="5" fill="#000"/>
      <rect x="440" y="208" width="320" height="7" fill="#000"/>
      <rect x="440" y="226" width="320" height="9" fill="#000"/>
      <rect x="440" y="246" width="320" height="11" fill="#000"/>
    </mask>
    <clipPath id="gridClip"><rect x="0" y="259" width="1200" height="141"/></clipPath>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="1.4" fill="#000" opacity="0.28"/>
    </pattern>
    <style>
      .tw { animation: tw 3.2s ease-in-out infinite; }
      @keyframes tw { 0%,100% { opacity: .12; } 50% { opacity: 1; } }
      .shoot { animation: shoot 9s linear infinite; opacity: 0; }
      .shoot2 { animation: shoot 13s linear infinite; animation-delay: 5s; opacity: 0; }
      @keyframes shoot {
        0%   { transform: translate(0,0); opacity: 0; }
        2%   { opacity: 1; }
        10%  { transform: translate(430px,190px); opacity: 0; }
        100% { transform: translate(430px,190px); opacity: 0; }
      }
      .title { animation: rise 1.6s cubic-bezier(.2,.7,.3,1) both; }
      .loc   { animation: rise 1.6s cubic-bezier(.2,.7,.3,1) .5s both; }
      @keyframes rise { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
      .sunpulse { animation: pulse 5s ease-in-out infinite; transform-origin: 600px 235px; }
      @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.03); } }
    </style>
  </defs>

  <!-- sky -->
  <rect width="1200" height="400" fill="url(#sky)"/>

  <!-- stars -->
  <g fill="#ffffff">
    <circle class="tw" style="animation-delay:0s"    cx="60"   cy="50"  r="1.6"/>
    <circle class="tw" style="animation-delay:-1.1s" cx="140"  cy="120" r="1.2"/>
    <circle class="tw" style="animation-delay:-2.2s" cx="220"  cy="40"  r="1.4"/>
    <circle class="tw" style="animation-delay:-0.6s" cx="300"  cy="90"  r="1.1"/>
    <circle class="tw" style="animation-delay:-1.8s" cx="370"  cy="35"  r="1.7"/>
    <circle class="tw" style="animation-delay:-2.7s" cx="450"  cy="70"  r="1.2"/>
    <circle class="tw" style="animation-delay:-0.3s" cx="540"  cy="30"  r="1.3"/>
    <circle class="tw" style="animation-delay:-1.5s" cx="660"  cy="55"  r="1.6"/>
    <circle class="tw" style="animation-delay:-2.4s" cx="760"  cy="30"  r="1.2"/>
    <circle class="tw" style="animation-delay:-0.9s" cx="830"  cy="95"  r="1.4"/>
    <circle class="tw" style="animation-delay:-1.9s" cx="900"  cy="45"  r="1.1"/>
    <circle class="tw" style="animation-delay:-2.9s" cx="980"  cy="110" r="1.5"/>
    <circle class="tw" style="animation-delay:-0.4s" cx="1050" cy="60"  r="1.3"/>
    <circle class="tw" style="animation-delay:-1.3s" cx="1120" cy="30"  r="1.6"/>
    <circle class="tw" style="animation-delay:-2.1s" cx="1170" cy="130" r="1.2"/>
    <circle class="tw" style="animation-delay:-0.8s" cx="90"   cy="180" r="1.1"/>
    <circle class="tw" style="animation-delay:-1.6s" cx="260"  cy="160" r="1.2"/>
    <circle class="tw" style="animation-delay:-2.6s" cx="1010" cy="170" r="1.2"/>
    <circle class="tw" style="animation-delay:-1.2s" cx="1140" cy="200" r="1.1"/>
    <circle class="tw" style="animation-delay:-0.2s" cx="30"   cy="230" r="1.2"/>
  </g>

  <!-- shooting stars -->
  <g class="shoot">
    <line x1="150" y1="40" x2="90" y2="14" stroke="url(#meteor)" stroke-width="2" stroke-linecap="round"/>
  </g>
  <g class="shoot2">
    <line x1="760" y1="60" x2="700" y2="34" stroke="url(#meteor)" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- sun -->
  <g class="sunpulse">
    <circle cx="600" cy="235" r="118" fill="url(#sun)" mask="url(#sunMask)" filter="url(#glow)" opacity="0.95"/>
  </g>

  <!-- mountains -->
  <g>
    <polygon points="0,260 130,190 220,235 330,175 430,260" fill="#0d0420"/>
    <polyline points="0,260 130,190 220,235 330,175 430,260" fill="none" stroke="#ff2fd6" stroke-width="1.4" opacity="0.65" filter="url(#glowSoft)"/>
    <polygon points="770,260 880,185 960,225 1080,170 1200,245 1200,260" fill="#0d0420"/>
    <polyline points="770,260 880,185 960,225 1080,170 1200,245 1200,260" fill="none" stroke="#ff2fd6" stroke-width="1.4" opacity="0.65" filter="url(#glowSoft)"/>
  </g>

  <!-- horizon -->
  <rect x="0" y="257" width="1200" height="2.5" fill="#ff2fd6" opacity="0.9" filter="url(#glowSoft)"/>

  <!-- perspective grid -->
  <g clip-path="url(#gridClip)" stroke="#ff2fd6">
    <!-- radial fan -->
    <g opacity="0.5" stroke-width="1.2">
      <line x1="600" y1="258" x2="600"  y2="400"/>
      <line x1="600" y1="258" x2="545"  y2="400"/>
      <line x1="600" y1="258" x2="655"  y2="400"/>
      <line x1="600" y1="258" x2="470"  y2="400"/>
      <line x1="600" y1="258" x2="730"  y2="400"/>
      <line x1="600" y1="258" x2="370"  y2="400"/>
      <line x1="600" y1="258" x2="830"  y2="400"/>
      <line x1="600" y1="258" x2="230"  y2="400"/>
      <line x1="600" y1="258" x2="970"  y2="400"/>
      <line x1="600" y1="258" x2="40"   y2="400"/>
      <line x1="600" y1="258" x2="1160" y2="400"/>
      <line x1="600" y1="258" x2="-220" y2="400"/>
      <line x1="600" y1="258" x2="1420" y2="400"/>
      <line x1="600" y1="258" x2="-560" y2="400"/>
      <line x1="600" y1="258" x2="1760" y2="400"/>
    </g>
    <!-- scrolling horizontals -->
    <g stroke-width="1.3">
      <line x1="0" x2="1200" y1="260" y2="260" opacity="0.16">
        <animate attributeName="y1" values="260;264" dur="1.7s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="260;264" dur="1.7s" repeatCount="indefinite"/>
      </line>
      <line x1="0" x2="1200" y1="264" y2="264" opacity="0.22">
        <animate attributeName="y1" values="264;268" dur="1.7s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="264;268" dur="1.7s" repeatCount="indefinite"/>
      </line>
      <line x1="0" x2="1200" y1="268" y2="268" opacity="0.28">
        <animate attributeName="y1" values="268;275" dur="1.7s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="268;275" dur="1.7s" repeatCount="indefinite"/>
      </line>
      <line x1="0" x2="1200" y1="275" y2="275" opacity="0.34">
        <animate attributeName="y1" values="275;283" dur="1.7s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="275;283" dur="1.7s" repeatCount="indefinite"/>
      </line>
      <line x1="0" x2="1200" y1="283" y2="283" opacity="0.4">
        <animate attributeName="y1" values="283;295" dur="1.7s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="283;295" dur="1.7s" repeatCount="indefinite"/>
      </line>
      <line x1="0" x2="1200" y1="295" y2="295" opacity="0.46">
        <animate attributeName="y1" values="295;311" dur="1.7s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="295;311" dur="1.7s" repeatCount="indefinite"/>
      </line>
      <line x1="0" x2="1200" y1="311" y2="311" opacity="0.52">
        <animate attributeName="y1" values="311;332" dur="1.7s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="311;332" dur="1.7s" repeatCount="indefinite"/>
      </line>
      <line x1="0" x2="1200" y1="332" y2="332" opacity="0.6">
        <animate attributeName="y1" values="332;360" dur="1.7s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="332;360" dur="1.7s" repeatCount="indefinite"/>
      </line>
      <line x1="0" x2="1200" y1="360" y2="360" opacity="0.68">
        <animate attributeName="y1" values="360;399" dur="1.7s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="360;399" dur="1.7s" repeatCount="indefinite"/>
      </line>
      <line x1="0" x2="1200" y1="399" y2="399" opacity="0.75">
        <animate attributeName="y1" values="399;451" dur="1.7s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="399;451" dur="1.7s" repeatCount="indefinite"/>
      </line>
    </g>
  </g>

  <!-- name -->
  <g class="title">
    <text x="600" y="142" text-anchor="middle" font-family="Verdana, 'DejaVu Sans', Arial, sans-serif" font-size="66" font-weight="bold" letter-spacing="10" fill="url(#txt)" filter="url(#glow)">TEJAS PAWAR</text>
  </g>

  <!-- cycling roles -->
  <g font-family="Verdana, 'DejaVu Sans', Arial, sans-serif" font-size="19" letter-spacing="5" text-anchor="middle" fill="#8be9fd" filter="url(#glowSoft)">
    <text x="600" y="184" opacity="0">
      <animate attributeName="opacity" begin="0s"  dur="16s" repeatCount="indefinite" keyTimes="0;0.03;0.22;0.25;1" values="0;1;1;0;0"/>
      WEB DEVELOPER · MERN STACK
    </text>
    <text x="600" y="184" opacity="0">
      <animate attributeName="opacity" begin="4s"  dur="16s" repeatCount="indefinite" keyTimes="0;0.03;0.22;0.25;1" values="0;1;1;0;0"/>
      IAM PROFESSIONAL · SAILPOINT
    </text>
    <text x="600" y="184" opacity="0">
      <animate attributeName="opacity" begin="8s"  dur="16s" repeatCount="indefinite" keyTimes="0;0.03;0.22;0.25;1" values="0;1;1;0;0"/>
      DAILY DSA GRINDER · JAVA &amp; PYTHON
    </text>
    <text x="600" y="184" opacity="0">
      <animate attributeName="opacity" begin="12s" dur="16s" repeatCount="indefinite" keyTimes="0;0.03;0.22;0.25;1" values="0;1;1;0;0"/>
      BUILDER · LEARNER · GAMER
    </text>
  </g>

  <!-- location -->
  <g class="loc">
    <text x="600" y="212" text-anchor="middle" font-family="Verdana, 'DejaVu Sans', Arial, sans-serif" font-size="12" letter-spacing="6" fill="#c8d3f5" opacity="0.85">PUNE · INDIA</text>
  </g>

  <!-- CRT scanlines -->
  <rect width="1200" height="400" fill="url(#scan)" opacity="0.18"/>
</svg>
