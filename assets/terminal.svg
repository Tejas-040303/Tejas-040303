<svg width="860" height="310" viewBox="0 0 860 310" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Animated terminal introducing Tejas Pawar">
  <defs>
    <clipPath id="type1"><rect x="28" y="56" height="24" width="0"><animate attributeName="width" from="0" to="128" dur="0.9s" begin="0.4s" fill="freeze"/></rect></clipPath>
    <clipPath id="type2"><rect x="28" y="112" height="24" width="0"><animate attributeName="width" from="0" to="196" dur="1.1s" begin="2s" fill="freeze"/></rect></clipPath>
    <style>
      text { font-family: ui-monospace, 'Cascadia Code', 'Fira Code', Menlo, Consolas, 'DejaVu Sans Mono', monospace; font-size: 15px; }
      .out { opacity: 0; }
      .blink { animation: blink 1.1s steps(2, start) infinite; }
      @keyframes blink { to { visibility: hidden; } }
      .frame { animation: framePulse 6s ease-in-out infinite; }
      @keyframes framePulse { 0%,100% { stroke: #2d2b55; } 50% { stroke: #45418f; } }
    </style>
  </defs>

  <!-- window -->
  <rect class="frame" x="1.5" y="1.5" width="857" height="307" rx="14" fill="#13131f" stroke="#2d2b55" stroke-width="1.5"/>
  <path d="M1.5 15.5 A14 14 0 0 1 15.5 1.5 H844.5 A14 14 0 0 1 858.5 15.5 V36 H1.5 Z" fill="#0d0d16"/>
  <circle cx="24" cy="19" r="6" fill="#ff5f57"/>
  <circle cx="46" cy="19" r="6" fill="#febc2e"/>
  <circle cx="68" cy="19" r="6" fill="#28c840"/>
  <text x="430" y="24" text-anchor="middle" fill="#6b7089" font-size="13px">tejas@dev: ~</text>

  <!-- $ whoami -->
  <text x="28" y="73" clip-path="url(#type1)"><tspan fill="#50fa7b">➜</tspan><tspan fill="#8be9fd" dx="8">~</tspan><tspan fill="#f8f8f2" dx="8">whoami</tspan></text>
  <text class="out" x="28" y="98" fill="#a6accd">Tejas Pawar — Web Developer &amp; IAM Professional · Pune, India
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.5s" fill="freeze"/>
  </text>

  <!-- $ cat today.log -->
  <text x="28" y="129" clip-path="url(#type2)"><tspan fill="#50fa7b">➜</tspan><tspan fill="#8be9fd" dx="8">~</tspan><tspan fill="#f8f8f2" dx="8">cat today.log</tspan></text>
  <text class="out" x="28" y="156" fill="#a6accd"><tspan fill="#50fa7b">✔ office</tspan><tspan dx="12">SailPoint IdentityIQ · identity governance &amp; access certs</tspan>
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.3s" fill="freeze"/>
  </text>
  <text class="out" x="28" y="180" fill="#a6accd"><tspan fill="#50fa7b">✔ grind</tspan><tspan dx="21">DSA problem-solving — Java &amp; Python</tspan>
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.7s" fill="freeze"/>
  </text>
  <text class="out" x="28" y="204" fill="#a6accd"><tspan fill="#50fa7b">✔ build</tspan><tspan dx="21">MERN stack side projects</tspan>
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="4.1s" fill="freeze"/>
  </text>
  <text class="out" x="28" y="228" fill="#a6accd"><tspan fill="#50fa7b">✔ streak</tspan><tspan dx="12">daily learning goals — checked</tspan>
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="4.5s" fill="freeze"/>
  </text>

  <!-- status line -->
  <text class="out" x="28" y="258" fill="#6272a4">// consistency &gt; intensity — shipped something small today too
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="5s" fill="freeze"/>
  </text>

  <!-- prompt + cursor -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="5.5s" fill="freeze"/>
    <text x="28" y="288"><tspan fill="#50fa7b">➜</tspan><tspan fill="#8be9fd" dx="8">~</tspan></text>
    <rect class="blink" x="72" y="274" width="9" height="18" fill="#f8f8f2"/>
  </g>
</svg>
